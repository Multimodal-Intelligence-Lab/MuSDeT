# Context sweep: ctx=10
dataset:
  name: affectiveroad
  data_dir: data/affectiveroad
  n_classes: 2
  context_length: 10
  causal: true
  modality_names: [Left_BVP, Left_EDA, Left_HR, Left_TEMP, Right_BVP, Right_EDA, Right_HR, Right_TEMP]
  modality_rates: [64, 4, 1, 4, 64, 4, 1, 4]

model:
  name: coinfo_gru
  embed_dim: 30
  hidden_channels: 32
  encoder_type: multiscale_cnn
  fusion_type: simple
  temporal_type: gru
  temporal_hidden: 128
  temporal_layers: 2
  dropout: 0.3

training:
  batch_size: 256
  lr: 0.001
  epochs: 100
  patience: 10
  grad_clip: 1.0
  seed: 42
  label_smoothing: 0.1
  weight_decay: 0.0001
  num_workers: 0
  loss_type: ce
  class_weights: balanced
  results_dir: results/affectiveroad/ctx10
